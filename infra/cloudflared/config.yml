# Cloudflare Tunnel configuration for project dev environment
# Exposes the local dev environment at dev-project.faheemlabs.com
#
# Setup:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create project-dev
#   3. Copy the credentials JSON to infra/cloudflared/creds/<TUNNEL_UUID>.json
#   4. Replace the tunnel UUID below with your actual tunnel UUID
#   5. Create the DNS record:
#      cloudflared tunnel route dns project-dev dev-project.faheemlabs.com

tunnel: <TUNNEL_UUID>
credentials-file: /etc/cloudflared/creds/<TUNNEL_UUID>.json

ingress:
  # API requests: route /api/... to Flask backend on port 5000
  - hostname: dev-project.faheemlabs.com
    path: "^/api/.*"
    service: http://localhost:5000
    originRequest:
      noTLSVerify: true

  # Health check endpoint on the API
  - hostname: dev-project.faheemlabs.com
    path: /health
    service: http://localhost:5000

  # All other traffic goes to the Vite dev frontend on port 3000
  - hostname: dev-project.faheemlabs.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true

  # Catch-all rule (required by cloudflared)
  - service: http_status:404
