# Prod secrets template.
#
# Copy this file to podman/secrets.prod.yaml (gitignored), fill in STRONG values,
# then load it into podman BEFORE starting the prod pod:
#
#   cp podman/secrets.prod.example.yaml podman/secrets.prod.yaml
#   podman play kube podman/secrets.prod.yaml     # or: cmds secrets
#
# stringData holds plaintext values (podman base64-encodes them for you).
apiVersion: v1
kind: Secret
metadata:
  name: dpm-prod-secrets
type: Opaque
stringData:
  # Postgres password (used by both POSTGRES_PASSWORD and DB_PASSWORD).
  db-password: CHANGE-ME-postgres-password
  # Rails secret_key_base. Generate one with: openssl rand -hex 64
  secret-key-base: CHANGE-ME-secret-key-base
