# Dev secrets template.
#
# Copy this file to podman/secrets.dev.yaml (gitignored), fill in real values,
# then load it into podman BEFORE starting the dev pod:
#
#   cp podman/secrets.dev.example.yaml podman/secrets.dev.yaml
#   podman play kube podman/secrets.dev.yaml      # or: cmds secrets
#
# stringData holds plaintext values (podman base64-encodes them for you).
# The pod YAML references these via env valueFrom.secretKeyRef.
apiVersion: v1
kind: Secret
metadata:
  name: dpm-dev-secrets
type: Opaque
stringData:
  # Postgres password (used by both POSTGRES_PASSWORD and DB_PASSWORD).
  db-password: postgres
  # Rails secret_key_base. Generate one with: openssl rand -hex 64
  secret-key-base: change-me-dev-secret-key-base
