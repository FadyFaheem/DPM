# Cloudflare Tunnel configuration for the dev environment.
# Exposes the local dev environment at dms-dev.faheemlabs.com
#
# Tunnel: dms-dev
# The credentials file is mounted into the cloudflared container at
# /etc/cloudflared/creds (the pod mounts ./cloudflared -> /etc/cloudflared).

tunnel: a30a7c7b-5ad1-438c-9acc-18d230f51b23
credentials-file: /etc/cloudflared/creds/a30a7c7b-5ad1-438c-9acc-18d230f51b23.json

ingress:
  # API requests: route /api/... to the Rails backend on port 5000
  - hostname: dms-dev.faheemlabs.com
    path: "^/api/.*"
    service: http://localhost:5000
    originRequest:
      noTLSVerify: true

  # Health check endpoint on the API
  - hostname: dms-dev.faheemlabs.com
    path: /health
    service: http://localhost:5000

  # All other traffic goes to the Vite dev frontend on port 3000
  - hostname: dms-dev.faheemlabs.com
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true

  # Catch-all rule (required by cloudflared)
  - service: http_status:404
